<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <input v-model.lazy="name" , placeholder="이름을 입력하세요" />
      <br />
      <input v-model.lazy="user.age" , placeholder="나이를 입력하세요" />
      <br />
      <input v-model.lazy="user.email" , placeholder="이메일을 입력하세요" />
      <br />
    </div>

    <script>
      const { createApp, ref, reactive, watchEffect } = Vue;

      createApp({
        setup() {
          const name = ref('');
          const user = reactive({
            age: 0,
            email: '',
          });

          watchEffect(() => {
            console.log(name.value);
            console.log(user.age);
            console.log(user.email);
          });

          return { name, user };
        },
      }).mount('#app');
    </script>
  </body>
</html>
