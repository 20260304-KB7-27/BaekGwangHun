<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>deep-ex-1</title>
    <script src="https://unpkg.com/vue@3"></script>

    <style>
      table {
        border-collapse: collapse;
        width: 100%;
      }
      th,
      td {
        border: 1px solid #ccc;
        padding: 8px;
      }
      th {
        background: #eee;
      }
    </style>
  </head>

  <body>
    <div id="app">
      <h2>사용자목록</h2>

      정렬기준:
      <label><input type="radio" value="id" v-model="sortKey" /> id</label>
      <label><input type="radio" value="name" v-model="sortKey" /> name</label>
      <label
        ><input type="radio" value="username" v-model="sortKey" />
        username</label
      >
      <label
        ><input type="radio" value="phone" v-model="sortKey" /> phone</label
      >

      <table>
        <thead>
          <tr>
            <th>id</th>
            <th>name</th>
            <th>username</th>
            <th>phone</th>
            <th>company</th>
          </tr>
        </thead>

        <tbody>
          <tr v-for="user in sortedUsers" :key="user.id">
            <td>{{ user.id }}</td>
            <td>{{ user.name }}</td>
            <td>{{ user.username }}</td>
            <td>{{ user.phone }}</td>
            <td>{{ user.company.name }}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <script>
      const users = [
        {

        },
      ];

      Vue.createApp({
        data() {
          return {
            sortKey: 'id',
            users,
          };
        },

        computed: {
          sortedUsers() {
            return [...this.users].sort((a, b) => {
              if (a[this.sortKey] < b[this.sortKey]) return -1;
              if (a[this.sortKey] > b[this.sortKey]) return 1;
              return 0;
            });
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
