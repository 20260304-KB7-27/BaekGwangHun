<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      let Action = function () {
        alert('함수 호출');
      };

      function call(callback, cnt) {
        for (let i = 0; i < cnt; i++) {
          callback();
        }
      }

      call(Action, 3);
    </script>
  </head>

  <body></body>
</html>
