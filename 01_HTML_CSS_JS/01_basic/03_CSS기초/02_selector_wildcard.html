<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      /* 전체 선택자 */
      * {
        color: red;
      }

      /* 태그 선택자 */
      h1 {
        color: blue;
      }

      /* 
      클래스 선택자 
      - 여러 클래스를 한 번에 적용할 수 있다.
      */
      .select {
        color: black;
      }

      /* ID 선택자 */
      #banana {
        color: aqua;
      }

      #bana {
        background-color: olive;
      }

      .item {
        background-color: blueviolet;
      }
    </style>
  </head>
  <body>
    <!-- 
    전체 선택자(*) - 모든 요소를 선택
    -->

    <h1>제목 글자</h1>
    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Placeat voluptas
      quasi odio error magni! Quod eveniet neque ratione, ducimus porro
      deserunt. Dolor esse iste expedita nesciunt id numquam, obcaecati
      reprehenderit.
    </p>

    <ul>
      <li>사과</li>
      <li id="banana bana" class="select">바나나</li>
      <li>오렌지</li>
      <li class="select">감</li>
    </ul>
  </body>
</html>
