<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // var

      // let 일반적인 변수
      // const 상수 (값이 변경되면 안될 때)

      let date = new Date();
      let month = date.getMonth() + 1;
      console.log(month);

      if (month >= 3 && month <= 5) {
        alert('봄입니다.');
      } else if (month >= 6 && month <= 8) {
        alert('여름입니다.');
      } else if (month >= 9 && month <= 11) {
        alert('가을입니다.');
      } else {
        alert('겨울입니다.');
      }
    </script>
  </head>

  <body></body>
</html>
